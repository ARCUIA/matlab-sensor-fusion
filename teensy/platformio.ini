; ARCUIA Sensor Fusion — PlatformIO config
; VS Code → PlatformIO → Open Project → select this `teensy/` folder

[env:teensy41]
platform        = teensy
board           = teensy41
framework       = arduino
monitor_speed   = 1000000
upload_protocol = teensy-cli
build_flags     = -O2 -ffast-math -DUSB_SERIAL

; Flat src layout — main.cpp + AHRSFilter.cpp are all in this folder
src_dir = .

lib_deps =
    sparkfun/SparkFun 9DoF IMU Breakout - ICM 20948 - Arduino Library@^1.2.13
    mikalhart/TinyGPSPlus@^1.0.3

; If you swap to a different IMU, replace ICM_20948 above with one of:
;   adafruit/Adafruit BNO08x@^1.2.3        ; (BNO085/086 — onboard fusion)
;   bolderflight/Bolder Flight Systems MPU9250@^1.0.2
;   stm32duino/STM32duino LSM6DSL@^2.0.0   ; (LSM6DSO + LIS3MDL)
